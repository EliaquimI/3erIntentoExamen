<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Buscador de Noticias</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<div class="container my-4">

    <h3 class="mb-4">Buscador de noticias</h3>

    <div class="row g-3">

        <div class="col-md-4">
            <input type="text" id="txtQuery" class="form-control" placeholder="Buscar...">
        </div>

        <div class="col-md-3">
            <input type="date" id="dateFrom" class="form-control">
        </div>

        <div class="col-md-3">
            <input type="date" id="dateTo" class="form-control">
        </div>

        <div class="col-md-2">
            <button id="btnBuscar" class="btn btn-outline-success w-100">
                Buscar
            </button>
        </div>

    </div>

    <hr>

    <div id="contenedorNoticias" class="row g-4 mt-2">
    </div>

    <div id="mensaje" class="mt-3 text-center"></div>

</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

<script src="app.js"></script>
</body>
</html>
